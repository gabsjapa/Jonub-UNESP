<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JONUB 2026 - Jornada de Nutrição da UNESP de Botucatu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-creme">

  <!-- NAVEGAÇÃO -->
  <nav class="sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <img src="https://i.imgur.com/NLf5u6p.png" alt="Logo JONUB" class="h-14 md:h-16">
        <div>
          <h2 class="text-3xl font-bold title-font text-dark">JONUB 2026</h2>
          <p class="text-xs text-gray-600">Jornada de Nutrição da UNESP Botucatu</p>
        </div>
      </div>
      
      <div class="hidden md:flex gap-8 text-lg font-medium text-dark">
        <a href="#home" class="hover:text-accent transition">Início</a>
        <a href="#historia" class="hover:text-accent transition">História</a>
        <a href="#programacao" class="hover:text-accent transition">Programação</a>
        <a href="#inscricoes" class="hover:text-accent transition">Inscrições</a>
      </div>
      
      <a href="#inscricoes" class="bg-accent text-white font-bold px-8 py-3 rounded-xl hover:bg-orange-700 transition">
        Inscreva-se
      </a>
    </div>
  </nav>

  <!-- BANNER -->
  <header id="home" class="bg-creme py-12 md:py-20 text-center">
    <div class="max-w-6xl mx-auto px-6">
      <img src="https://i.imgur.com/gqKiqUo.png" alt="JONUB 2026" class="mx-auto w-full max-w-5xl">
    </div>
  </header>

  <!-- HISTÓRIA -->
  <section id="historia" class="py-24 bg-white">
    <div class="max-w-6xl mx-auto px-6 text-center">
      <h2 class="text-5xl font-bold title-font text-dark mb-16">Nossa História</h2>
      <!-- Suas cards aqui -->
    </div>
  </section>

  <footer class="bg-[#1e3a2f] text-white py-12 text-center">
    <p class="text-xl">© 2026 JONUB - Jornada de Nutrição da UNESP de Botucatu</p>
  </footer>

</body>
</html>
