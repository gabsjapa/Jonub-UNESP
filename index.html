<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JONUB 2026 - Jornada de Nutrição da UNESP de Botucatu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');
    body { font-family: 'Inter', system_ui, sans-serif; }
    .title-font { font-family: 'Playfair Display', sans-serif; }
    .hero {
      background: linear-gradient(rgba(10, 61, 98, 0.85), rgba(10, 61, 98, 0.85));
      background-size: cover;
      background-position: center;
    }
  </style>
</head>
<body class="bg-gray-50">

  <!-- NAVEGAÇÃO -->
  <nav class="bg-[#0a3d62] text-white sticky top-0 z-50 shadow-lg">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <img src="https://i.imgur.com/NLf5u6p.png" 
             alt="Logo JONUB" class="h-14 md:h-16">
        <div>
          <h2 class="text-3xl font-bold title-font">JONUB 2026</h2>
          <p class="text-xs text-blue-200">Jornada de Nutrição da UNESP Botucatu</p>
        </div>
      </div>
      
      <div class="hidden md:flex gap-8 text-lg font-medium">
        <a href="#home" class="hover:text-yellow-400 transition">Início</a>
        <a href="#historia" class="hover:text-yellow-400 transition">História</a>
        <a href="#programacao" class="hover:text-yellow-400 transition">Programação</a>
        <a href="#inscricoes" class="hover:text-yellow-400 transition">Inscrições</a>
      </div>
      
      <a href="#inscricoes" class="bg-white text-[#0a3d62] font-bold px-8 py-3 rounded-xl hover:bg-yellow-400 transition">
        Inscreva-se
      </a>
    </div>
  </nav>

  <!-- CABEÇALHO / BANNER -->
  <header id="home" class="hero text-white py-20 md:py-32 text-center">
    <div class="max-w-6xl mx-auto px-6">
      <img src="https://i.imgur.com/gqKiqUo.png" 
           alt="JONUB 2026" class="mx-auto mb-8 w-full max-w-4xl">
    </div>
  </header>

  <!-- Resto do site (História) -->
  <section id="historia" class="py-24 bg-white">
    <div class="max-w-6xl mx-auto px-6">
      <h2 class="text-5xl font-bold title-font text-center text-[#0a3d62] mb-16">Nossa História</h2>
      <!-- (mantenho a seção que já tínhamos) -->
    </div>
  </section>

  <footer class="bg-gray-900 text-white py-12 text-center">
    <p class="text-xl">© 2026 JONUB - Jornada de Nutrição da UNESP de Botucatu</p>
  </footer>

</body>
</html>
