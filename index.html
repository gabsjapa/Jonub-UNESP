<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JONUB 2026 - Jornada de Nutrição da UNESP de Botucatu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');
    body { font-family: 'Inter', system_ui, sans-serif; }
    .title-font { font-family: 'Playfair Display', sans-serif; }
  </style>
</head>
<body class="bg-[#f8f1e9]">

  <!-- NAVEGAÇÃO - Mesma cor do Hepato -->
  <nav class="bg-[#0a3d62] text-white sticky top-0 z-50 shadow-lg">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <img src="https://i.imgur.com/NLf5u6p.png" alt="Logo JONUB" class="h-14 md:h-16">
        <div>
          <h2 class="text-3xl font-bold title-font">JONUB 2026</h2>
          <p class="text-xs text-blue-200">Jornada de Nutrição da UNESP Botucatu</p>
        </div>
      </div>
      
      <div class="hidden md:flex gap-8 text-lg font-medium">
        <a href="#home" class="hover:text-[#f59e0b] transition">Início</a>
        <a href="#historia" class="hover:text-[#f59e0b] transition">História</a>
        <a href="#programacao" class="hover:text-[#f59e0b] transition">Programação</a>
        <a href="#inscricoes" class="hover:text-[#f59e0b] transition">Inscrições</a>
      </div>
      
      <a href="#inscricoes" class="bg-[#f59e0b] text-[#0a3d62] font-bold px-8 py-3 rounded-xl hover:bg-white hover:text-[#0a3d62] transition">
        Inscreva-se
      </a>
    </div>
  </nav>

  <!-- BANNER -->
  <header id="home" class="bg-gradient-to-br from-[#0a3d62] to-[#1e5a8a] text-white py-12 md:py-20 text-center">
    <div class="max-w-6xl mx-auto px-6">
      <img src="https://i.imgur.com/gqKiqUo.png" 
           alt="JONUB 2026" class="mx-auto w-full max-w-5xl">
    </div>
  </header>

  <!-- HISTÓRIA -->
  <section id="historia" class="py-24 bg-white">
    <div class="max-w-6xl mx-auto px-6 text-center">
      <h2 class="text-5xl font-bold title-font text-[#0a3d62] mb-16">Nossa História</h2>
      <!-- suas cards aqui -->
    </div>
  </section>

  <!-- Inscrições -->
  <section id="inscricoes" class="py-20 bg-[#0a3d62] text-white text-center">
    <div class="max-w-4xl mx-auto px-6">
      <h2 class="text-4xl font-bold mb-6">Inscreva-se no JONUB 2026</h2>
      <a href="#" class="inline-block bg-[#f59e0b] text-[#0a3d62] font-bold text-xl px-12 py-5 rounded-xl hover:bg-white transition">
        Realizar Inscrição
      </a>
    </div>
  </section>

  <footer class="bg-[#0a3d62] text-white py-12 text-center">
    <p class="text-xl">© 2026 JONUB - Jornada de Nutrição da UNESP de Botucatu</p>
  </footer>

</body>
</html>
