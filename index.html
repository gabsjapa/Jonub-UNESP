<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JONUB 2026 - Jornada de Nutrição da UNESP de Botucatu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-creme">

  <!-- NAVEGAÇÃO -->
  <nav class="bg-creme border-b border-[#e8d9c0] sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 md:px-6 py-4">
      <div class="flex justify-between items-center">
        <div class="flex items-center gap-3">
          <img src="https://i.imgur.com/NLf5u6p.png" alt="Logo JONUB" class="h-12 md:h-16">
          <div>
            <h2 class="text-2xl md:text-3xl font-bold title-font text-dark">JONUB 2026</h2>
            <p class="text-xs md:text-sm text-gray-600">Jornada de Nutrição da UNESP Botucatu</p>
          </div>
        </div>

        <!-- MENU DESKTOP - COM MAIS ESPAÇAMENTO -->
        <div class="hidden md:flex gap-10 lg:gap-12 text-base lg:text-lg font-medium text-dark">
          <a href="#home" class="hover:text-[#166534] transition">Início</a>
          <a href="#sobre" class="hover:text-[#166534] transition">Sobre</a>
          <a href="#atividades" class="hover:text-[#166534] transition">Atividades</a>
          <a href="#convidados" class="hover:text-[#166534] transition">Convidados</a>
          <a href="#submissoes" class="hover:text-[#166534] transition">Submissões</a>
          <a href="#modelos" class="hover:text-[#166534] transition">Modelos</a>
          <a href="#contato" class="hover:text-[#166534] transition">Contato</a>
        </div>

        <a href="https://cheers.com.br" target="_blank" class="btn-inscreva hidden md:block">
          INSCREVA-SE
        </a>

        <button id="menu-btn" class="md:hidden text-3xl text-dark p-2">
          <i class="fas fa-bars"></i>
        </button>
      </div>

      <!-- Menu Mobile -->
      <div id="mobile-menu" class="hidden md:hidden mt-6 pt-6 border-t border-gray-200">
        <div class="flex flex-col gap-5 text-lg text-dark">
          <a href="#home" class="mobile-link hover:text-[#166534] transition py-3">Início</a>
          <a href="#sobre" class="mobile-link hover:text-[#166534] transition py-3">Sobre</a>
          <a href="#atividades" class="mobile-link hover:text-[#166534] transition py-3">Atividades</a>
          <a href="#convidados" class="mobile-link hover:text-[#166534] transition py-3">Convidados</a>
          <a href="#submissoes" class="mobile-link hover:text-[#166534] transition py-3">Submissões</a>
          <a href="#modelos" class="mobile-link hover:text-[#166534] transition py-3">Modelos</a>
          <a href="#contato" class="mobile-link hover:text-[#166534] transition py-3">Contato</a>
          <a href="https://cheers.com.br" target="_blank" class="btn-inscreva text-center mt-4">
            INSCREVA-SE
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- BANNER -->
  <header id="home" class="bg-creme py-10 md:py-20 text-center">
    <div class="max-w-6xl mx-auto px-4">
      <img src="https://i.imgur.com/gqKiqUo.png" alt="JONUB 2026" class="mx-auto w-full max-w-4xl">
    </div>
  </header>

  <!-- O resto do site (Sobre, Atividades, etc.) -->
  <!-- Você pode manter as seções que já tinha -->

</body>
</html>
